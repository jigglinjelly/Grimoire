<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Witches' Tarot Guidebook · Zoom & Toggle Readings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1e1a1a;
      background-image: radial-gradient(circle at 10% 20%, rgba(45, 35, 35, 0.6) 0%, #0f0c0c 100%);
      font-family: 'Segoe UI', 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
      color: #f3e9d2;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      background: rgba(20, 15, 18, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      overflow: hidden;
      border: 1px solid #5e4b3c;
    }

    /* TAB BAR */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #5e4b3c;
      background: #1f1917cc;
      padding: 0 1rem;
      gap: 0.5rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: #cfb99a;
      font-size: 1.1rem;
      padding: 0.8rem 1.8rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      border-radius: 30px 30px 0 0;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: #4a3729;
      color: #f7e5c2;
    }
    .tab-btn.active {
      background: #2c201b;
      color: #f5cb8b;
      border-bottom: 3px solid #e4b363;
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
    }

    /* LEFT SIDEBAR */
    .sidebar {
      flex: 1.2;
      min-width: 300px;
      background: #1f1917e6;
      backdrop-filter: blur(4px);
      border-right: 1px solid #4a3729;
      padding: 1.8rem 1.2rem;
      max-height: 85vh;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar::-webkit-scrollbar-track {
      background: #2f241f;
      border-radius: 8px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #b87c4f;
      border-radius: 8px;
    }

    .section-title {
      font-size: 1.8rem;
      letter-spacing: 2px;
      font-weight: 500;
      border-left: 5px solid #e4b363;
      padding-left: 1rem;
      margin: 1.5rem 0 1rem 0;
      font-family: 'Georgia', serif;
      text-shadow: 0 2px 3px black;
    }
    .section-title:first-of-type {
      margin-top: 0;
    }

    .text-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .text-guide-btn {
      background: #2c2220;
      border: 1px solid #6a4c38;
      color: #ffefcf;
      text-align: left;
      padding: 0.75rem 1.2rem;
      font-size: 1.05rem;
      font-weight: 500;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .text-guide-btn:hover {
      background: #8b5a3e;
      border-color: #dba562;
      color: white;
      transform: translateX(6px);
      box-shadow: 0 5px 12px rgba(0,0,0,0.3);
    }

    .text-guide-btn.active {
      background: #b46f42;
      border-color: #f7cf94;
      color: #fff6e6;
      box-shadow: 0 0 8px rgba(210, 140, 70, 0.6);
    }

    /* Major Arcana Grid (image buttons) */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 1rem;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .card-btn {
      background: #2b201c;
      border: 2px solid #644a38;
      border-radius: 20px;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-btn:hover {
      transform: translateY(-5px);
      border-color: #e7b46b;
      background: #3f2e26;
    }

    .card-btn.active-card {
      border: 3px solid #f5bc70;
      background: #4d3528;
      box-shadow: 0 0 0 2px #a76434;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 12px;
      background: #3f2c22;
      display: block;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .card-label {
      margin-top: 6px;
      font-size: 0.7rem;
      font-weight: 500;
      text-align: center;
      color: #efdbb8;
    }

    /* Expandable Minor Arcana Sections */
    .minor-suit {
      margin-top: 1rem;
      border: 1px solid #5e3f2e;
      border-radius: 20px;
      background: #241d1a70;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }
    .suit-header {
      background: #392b24;
      padding: 0.7rem 1rem;
      font-weight: bold;
      font-size: 1.2rem;
      color: #fad48b;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 20px 20px 0 0;
      transition: background 0.2s;
    }
    .suit-header:hover {
      background: #5a4034;
    }
    .suit-header .toggle-icon {
      font-size: 1.3rem;
    }
    .suit-cards {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 0.7rem;
      padding: 1rem;
      background: #1f1714c9;
      max-height: 380px;
      overflow-y: auto;
    }
    .suit-cards.open {
      display: grid;
    }
    .minor-card-btn {
      background: #2f231e;
      border: 1px solid #73563f;
      border-radius: 16px;
      padding: 0.4rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .minor-card-btn:hover {
      background: #8a5a3e;
      transform: scale(0.98);
    }
    .minor-card-btn.active-minor {
      border: 2px solid #f5bc70;
      background: #6d4732;
    }
    .minor-card-name {
      font-size: 0.75rem;
      font-weight: 500;
      color: #ffefcf;
      padding: 4px 0;
    }

    /* RIGHT PANEL: dual image viewer */
    .viewer {
      flex: 2.5;
      min-width: 320px;
      background: #130e0cd9;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.8rem;
      align-items: center;
      justify-content: center;
    }

    .viewer-header {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      border-bottom: 1px dashed #c49363;
      padding-bottom: 0.4rem;
      font-style: italic;
    }

    .dual-image-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      justify-content: center;
      align-items: flex-start;
    }
    .image-card {
      background: #01010155;
      border-radius: 24px;
      padding: 0.8rem;
      text-align: center;
      max-width: 380px;
      flex: 1;
      border: 1px solid #7c5d48;
    }
    .image-card img {
      max-width: 100%;
      max-height: 55vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 8px 18px black;
      cursor: pointer;
    }
    .image-caption {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #e1c394;
    }
    .fallback-message {
      background: #2b211d;
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      color: #cfb07c;
      font-size: 1.2rem;
    }
    .footer-note {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      opacity: 0.7;
      text-align: center;
    }

    /* READING TAB STYLES */
    .reading-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding: 1rem;
      background: #2a201c80;
      border-radius: 30px;
      align-items: center;
    }
    .template-btn {
      background: #362a24;
      border: 1px solid #b87c4f;
      color: #f3e2c9;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .template-btn:hover, .template-btn.active-template {
      background: #b46f42;
      border-color: #f7cf94;
      color: white;
    }
    .draw-btn {
      background: #6d4330;
      border: none;
      color: white;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      margin-left: auto;
    }
    .draw-btn:hover {
      background: #8b5a3e;
      transform: scale(1.02);
    }
    .reading-layout {
      background: #1e1714a0;
      border-radius: 2rem;
      padding: 2rem;
      min-height: 500px;
    }
    .cards-spread {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
    }
    .reading-card {
      background: #1f1815;
      border-radius: 20px;
      padding: 0.6rem;
      text-align: center;
      width: 140px;
      transition: all 0.2s;
      border: 1px solid #73563f;
    }
    .reading-card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
    }
    .reading-card-name {
      font-size: 0.7rem;
      margin-top: 6px;
      color: #e1c394;
    }
    .which-witch-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .top-card, .bottom-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    /* ZOOM MODAL STYLES */
    .zoom-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .zoom-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      cursor: default;
    }
    .zoom-content img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 2px solid #e4b363;
      cursor: pointer;
    }
    .zoom-close {
      position: absolute;
      top: -20px;
      right: -20px;
      width: 40px;
      height: 40px;
      background: #2c2220;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: #f3e9d2;
      cursor: pointer;
      border: 2px solid #b87c4f;
      transition: all 0.2s;
      z-index: 10001;
    }
    .zoom-close:hover {
      background: #8b5a3e;
      transform: scale(1.1);
    }
    .zoom-caption {
      text-align: center;
      margin-top: 12px;
      color: #e1c394;
      font-size: 0.9rem;
    }

    @media (max-width: 760px) {
      .reading-card { width: 100px; }
      .zoom-close { top: -10px; right: -10px; width: 32px; height: 32px; font-size: 18px; }
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); display: none; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="guide">📖 Grimoire Guide</button>
    <button class="tab-btn" data-tab="reading">🔮 Random Readings</button>
  </div>

  <!-- TAB 1: ORIGINAL GUIDEBOOK -->
  <div id="tab-guide" class="tab-content active">
    <div class="dashboard">
      <div class="sidebar">...</div>
      <div class="viewer">...</div>
    </div>
  </div>

  <!-- TAB 2: RANDOM READINGS -->
  <div id="tab-reading" class="tab-content">
    <div class="dashboard">
      <div class="sidebar" style="border-right: none; max-height: none;">
        <div class="section-title">✨ Choose Spread</div>
        <div class="reading-controls">
          <button class="template-btn active-template" data-template="one">🔮 One-card Pull</button>
          <button class="template-btn" data-template="three">🃏 Three-card Pull</button>
          <button class="template-btn" data-template="whichwitch">🌀 Which-Witch Spread</button>
          <button class="template-btn" data-template="safe">🌙 Lilia's Safe Passage</button>
          <button class="draw-btn" id="drawReadingBtn">🎴 Draw Reading</button>
        </div>
        <div class="reading-layout" id="readingLayout">
          <div class="fallback-message">Select a spread and click "Draw Reading" to begin.</div>
        </div>
        <div class="footer-note">✨ Click any card to zoom. For Major Arcana, click the zoomed image again to toggle between art and description.</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- IMAGE BASE PATH ----------
  const IMG_BASE = "https://raw.githubusercontent.com/jigglinjelly/Grimoire/main/images/";

  // ---------- FULL DECK (excludes guide cards) ----------
  const majorDeck = [
    "0 · The Fool", "I · The Magician", "II · The High Priestess", "III · The Empress", "IV · The Emperor",
    "V · The Hierophant", "VI · The Lovers", "VII · The Chariot", "VIII · Strength", "IX · The Hermit",
    "X · Wheel of Fortune", "XI · Justice", "XII · The Hanged Man", "XIII · Death", "XIV · Temperance",
    "XV · The Devil", "XVI · The Tower", "XVII · The Star", "XVIII · The Moon", "XIX · The Sun",
    "XX · Judgement", "XXI · The World"
  ];
  
  const minorRanks = ["Ace", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Page", "Knight", "Queen", "King"];
  const minorSuitsList = ["Wands", "Cups", "Swords", "Pentacles"];
  const minorDeck = [];
  minorSuitsList.forEach(suit => {
    minorRanks.forEach(rank => {
      minorDeck.push(`${rank} of ${suit}`);
    });
  });
  const FULL_DECK = [...majorDeck, ...minorDeck];
  
  function getCardImage(cardName, type = "thumb") {
    if (majorDeck.includes(cardName)) {
      const cardKeyMap = {
        "0 · The Fool": "fool",
        "I · The Magician": "magician",
        "II · The High Priestess": "high_priestess",
        "III · The Empress": "empress",
        "IV · The Emperor": "emperor",
        "V · The Hierophant": "hierophant",
        "VI · The Lovers": "lovers",
        "VII · The Chariot": "chariot",
        "VIII · Strength": "strength",
        "IX · The Hermit": "hermit",
        "X · Wheel of Fortune": "wheel_fortune",
        "XI · Justice": "justice",
        "XII · The Hanged Man": "hanged_man",
        "XIII · Death": "death",
        "XIV · Temperance": "temperance",
        "XV · The Devil": "devil",
        "XVI · The Tower": "tower",
        "XVII · The Star": "star",
        "XVIII · The Moon": "moon",
        "XIX · The Sun": "sun",
        "XX · Judgement": "judgement",
        "XXI · The World": "world"
      };
      const key = cardKeyMap[cardName];
      if (type === "thumb") return `thumb_${key}.jpg`;
      return `desc_${key}.jpg`;
    } else {
      const parts = cardName.split(" of ");
      const rank = parts[0].toLowerCase();
      const suit = parts[1].toLowerCase();
      return `desc_${rank}_${suit}.jpg`;
    }
  }

  let currentSpread = [];
  let currentTemplate = "one";
  // Store current image mode for each card (thumb or desc) - only for Major Arcana
  let cardImageModes = {};

  // ----- ZOOM MODAL FUNCTIONALITY -----
  function showZoom(cardName, cardIndex, currentImageSrc, isMajor) {
    // Remove any existing modal
    const existingModal = document.querySelector('.zoom-modal');
    if (existingModal) existingModal.remove();
    
    const modal = document.createElement('div');
    modal.className = 'zoom-modal';
    
    const content = document.createElement('div');
    content.className = 'zoom-content';
    
    const img = document.createElement('img');
    img.src = currentImageSrc;
    img.alt = cardName;
    
    const closeBtn = document.createElement('div');
    closeBtn.className = 'zoom-close';
    closeBtn.innerHTML = '✕';
    
    const caption = document.createElement('div');
    caption.className = 'zoom-caption';
    caption.innerHTML = isMajor ? `${cardName} — Click image to toggle between art and description` : cardName;
    
    content.appendChild(closeBtn);
    content.appendChild(img);
    content.appendChild(caption);
    modal.appendChild(content);
    
    // Close modal when clicking outside the image or on X
    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target === closeBtn) {
        modal.remove();
      }
    });
    
    // For Major Arcana: clicking the zoomed image toggles between thumb and desc
    if (isMajor) {
      let currentMode = cardImageModes[`${cardName}_${cardIndex}`] || "thumb";
      let currentImgSrc = currentImageSrc;
      
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        // Toggle mode
        const newMode = currentMode === "thumb" ? "desc" : "thumb";
        currentMode = newMode;
        cardImageModes[`${cardName}_${cardIndex}`] = newMode;
        const newSrc = IMG_BASE + getCardImage(cardName, newMode);
        img.src = newSrc;
        currentImgSrc = newSrc;
        
        // Also update the thumbnail in the reading spread
        const cardElement = document.querySelector(`.reading-card[data-cardname="${cardName}"][data-index="${cardIndex}"] img`);
        if (cardElement) {
          cardElement.src = newSrc;
        }
        
        caption.innerHTML = `${cardName} — ${newMode === "thumb" ? "Card Art" : "Description"} (click to toggle)`;
      });
    }
    
    document.body.appendChild(modal);
  }
  
  function renderCard(card, idx, rotated = false) {
    const mode = cardImageModes[`${card}_${idx}`] || "thumb";
    const imgSrc = getCardImage(card, mode);
    const isMajor = majorDeck.includes(card);
    const rotStyle = rotated ? 'transform:rotate(90deg); margin:1rem 0;' : '';
    
    return `<div class="reading-card" data-index="${idx}" data-cardname="${card}" data-ismajor="${isMajor}" style="${rotStyle}">
      <img src="${IMG_BASE}${imgSrc}" alt="${card}" data-cardname="${card}" data-index="${idx}" data-currentmode="${mode}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 150\'%3E%3Crect width=\'100\' height=\'150\' fill=\'%233b2a22\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23cb9e6b\' font-size=\'10\'%3E🃟%3C/text%3E%3C/svg%3E'">
      <div class="reading-card-name">${card}</div>
    </div>`;
  }
  
  function attachZoomListeners() {
    document.querySelectorAll('.reading-card img').forEach(img => {
      // Remove existing listener to avoid duplicates
      img.removeEventListener('click', img._zoomHandler);
      
      const handler = (e) => {
        e.stopPropagation();
        const cardDiv = img.closest('.reading-card');
        if (!cardDiv) return;
        const cardName = cardDiv.getAttribute('data-cardname');
        const cardIndex = cardDiv.getAttribute('data-index');
        const isMajor = cardDiv.getAttribute('data-ismajor') === 'true';
        const currentMode = cardImageModes[`${cardName}_${cardIndex}`] || "thumb";
        const currentSrc = IMG_BASE + getCardImage(cardName, currentMode);
        
        showZoom(cardName, parseInt(cardIndex), currentSrc, isMajor);
      };
      
      img._zoomHandler = handler;
      img.addEventListener('click', handler);
    });
  }
  
  function renderSpread() {
    const container = document.getElementById("readingLayout");
    
    if (currentTemplate === "one") {
      if (currentSpread.length) {
        container.innerHTML = `<div class="cards-spread" style="display:flex; justify-content:center;">${renderCard(currentSpread[0], 0)}</div>`;
      } else {
        container.innerHTML = `<div class="cards-spread" style="display:flex; justify-content:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f; display:flex; align-items:center; justify-content:center; color:#b87c4f;">✨ awaiting draw</div></div>`;
      }
    } 
    else if (currentTemplate === "three") {
      if (currentSpread.length) {
        container.innerHTML = `<div class="cards-spread" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2rem;">${currentSpread.map((c, i) => `<div style="text-align:center;">${renderCard(c, i)}</div>`).join('')}</div>`;
      } else {
        container.innerHTML = `<div class="cards-spread" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2rem;">${Array(3).fill().map(() => `<div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f; display:flex; align-items:center; justify-content:center; color:#b87c4f;">✨</div></div>`).join('')}</div>`;
      }
    }
    else if (currentTemplate === "whichwitch") {
      if (currentSpread.length) {
        const [top, ...bottom] = currentSpread;
        container.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; gap:2rem;">
          <div style="text-align:center;">${renderCard(top, 0)}<div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your elemental magic</div></div>
          <div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap;">
            <div style="text-align:center;">${renderCard(bottom[0], 1)}<div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your greatest strength</div></div>
            <div style="text-align:center;">${renderCard(bottom[1], 2)}<div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your hidden weakness</div></div>
            <div style="text-align:center;">${renderCard(bottom[2], 3)}<div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Lesson to learn on The Road</div></div>
          </div>
        </div>`;
      } else {
        container.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; gap:2rem;">
          <div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f; display:flex; align-items:center; justify-content:center; color:#b87c4f;">✨</div><div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your elemental magic</div></div>
          <div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap;">
            <div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f;"></div><div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your greatest strength</div></div>
            <div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f;"></div><div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Your hidden weakness</div></div>
            <div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f;"></div><div style="margin-top:8px; color:#e1c394; font-size:0.8rem;">Lesson to learn on The Road</div></div>
          </div>
        </div>`;
      }
    }
    else if (currentTemplate === "safe") {
      const captions = ["The Traveler", "What's Missing", "Path Behind", "Path Ahead", "Obstacles", "Windfall", "Destination"];
      if (currentSpread.length) {
        container.innerHTML = `<div class="cards-spread" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1.5rem;">${currentSpread.map((c, i) => 
          `<div style="text-align:center;">${renderCard(c, i)}<div class="card-caption" style="text-align:center; margin-top:8px; color:#e1c394; font-size:0.8rem; font-weight:bold;">${captions[i]}</div></div>`
        ).join('')}</div>`;
      } else {
        container.innerHTML = `<div class="cards-spread" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1.5rem;">${captions.map(caption => 
          `<div style="text-align:center;"><div class="reading-card-placeholder" style="width:140px; height:220px; background:#2a201c80; border-radius:20px; border:2px dashed #73563f; display:flex; align-items:center; justify-content:center; color:#b87c4f;">✨</div><div class="card-caption" style="text-align:center; margin-top:8px; color:#e1c394; font-size:0.8rem; font-weight:bold;">${caption}</div></div>`
        ).join('')}</div>`;
      }
    }
    
    // Attach zoom listeners after rendering
    attachZoomListeners();
  }
  
  function drawNonRepeating(count) {
    if (count > FULL_DECK.length) count = FULL_DECK.length;
    const shuffled = [...FULL_DECK];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, count);
  }
  
  function generateReading() {
    let count = 1;
    if (currentTemplate === "three") count = 3;
    else if (currentTemplate === "whichwitch") count = 4;
    else if (currentTemplate === "safe") count = 7;
    currentSpread = drawNonRepeating(count);
    cardImageModes = {}; // Reset all to thumb mode
    renderSpread();
  }
  
  // --- TAB SWITCHING & REUSING ORIGINAL GUIDEBOOK STRUCTURE ---
  function rebuildOriginalUI() {
    const originalSidebar = document.querySelector("#tab-guide .sidebar");
    const originalViewer = document.querySelector("#tab-guide .viewer");
    originalSidebar.innerHTML = `<div class="section-title">📖 Text Guides</div><div style="margin-bottom:0.5rem;font-size:1.2rem;font-weight:bold;color:#e7bf8e;">✨ Introduction</div><div class="text-buttons" id="intro-buttons"></div><div style="margin-bottom:0.5rem;margin-top:1.5rem;font-size:1.2rem;font-weight:bold;color:#e7bf8e;">🔮 Tarot Readings</div><div class="text-buttons" id="reading-buttons"></div><div class="section-title" style="margin-top:1.8rem;">🃏 Major Arcana</div><div class="cards-grid" id="major-grid-container"></div><div class="section-title" style="margin-top:0.5rem;">✨ Minor Arcana</div><div id="minor-arcana-accordion"></div><div class="footer-note">⚡ click any card/guide — all Major cards & Guides display two images.</div>`;
    originalViewer.innerHTML = `<div class="viewer-header">🌙 Sacred Pages 🌙</div><div id="viewerContent" class="dual-image-container"><div class="fallback-message">✨ select a guide or tarot card<br>to reveal the corresponding pages</div></div>`;
    
    // Simplified guidebook rebuild (keeping original functionality)
    const introItems = [{ display:"Welcome to the Coven", mainImg:"welcome_coven.jpg", secondImg:"welcome_coven_detail.jpg", dual:true },{ display:"Tarot Basics", mainImg:"tarot_basics.jpg", secondImg:null, dual:false },{ display:"Understanding Court Cards", mainImg:"court_cards.jpg", secondImg:null, dual:false },{ display:"Reading Reversals... or Not", mainImg:"reading_reversals.jpg", secondImg:null, dual:false }];
    const readingItems = [{ display:"Opening and Closing a Reading", mainImg:"opening_closing_reading.jpg", secondImg:"opening_closing_part2.jpg", dual:true },{ display:"What to Ask", mainImg:"what_to_ask.jpg", secondImg:null, dual:false },{ display:"Getting Started with Tarot Spreads", mainImg:"tarot_spreads_start.jpg", secondImg:null, dual:false },{ display:"Which-Witch Tarot Spread", mainImg:"which_witch_spread.jpg", secondImg:"which_witch_spread_page2.jpg", dual:true },{ display:"Lilia's Safe-Passage Tarot Spread", mainImg:"lilia_safe_passage.jpg", secondImg:null, dual:false }];
    const majorArcanaCards = [{ name:"📘 Major Arcana Guide", thumb:"major_guide_thumb.jpg", image1:"major_guide_thumb.jpg", image2:"major_guide_desc.jpg" },{ name:"📙 Minor Arcana Guide", thumb:"minor_guide_thumb.jpg", image1:"minor_guide_thumb.jpg", image2:"minor_guide_desc.jpg" },{ name:"0 · The Fool", thumb:"thumb_fool.jpg", image1:"thumb_fool.jpg", image2:"desc_fool.jpg" },{ name:"I · The Magician", thumb:"thumb_magician.jpg", image1:"thumb_magician.jpg", image2:"desc_magician.jpg" },{ name:"II · The High Priestess", thumb:"thumb_high_priestess.jpg", image1:"thumb_high_priestess.jpg", image2:"desc_high_priestess.jpg" },{ name:"III · The Empress", thumb:"thumb_empress.jpg", image1:"thumb_empress.jpg", image2:"desc_empress.jpg" },{ name:"IV · The Emperor", thumb:"thumb_emperor.jpg", image1:"thumb_emperor.jpg", image2:"desc_emperor.jpg" },{ name:"V · The Hierophant", thumb:"thumb_hierophant.jpg", image1:"thumb_hierophant.jpg", image2:"desc_hierophant.jpg" },{ name:"VI · The Lovers", thumb:"thumb_lovers.jpg", image1:"thumb_lovers.jpg", image2:"desc_lovers.jpg" },{ name:"VII · The Chariot", thumb:"thumb_chariot.jpg", image1:"thumb_chariot.jpg", image2:"desc_chariot.jpg" },{ name:"VIII · Strength", thumb:"thumb_strength.jpg", image1:"thumb_strength.jpg", image2:"desc_strength.jpg" },{ name:"IX · The Hermit", thumb:"thumb_hermit.jpg", image1:"thumb_hermit.jpg", image2:"desc_hermit.jpg" },{ name:"X · Wheel of Fortune", thumb:"thumb_wheel_fortune.jpg", image1:"thumb_wheel_fortune.jpg", image2:"desc_wheel_fortune.jpg" },{ name:"XI · Justice", thumb:"thumb_justice.jpg", image1:"thumb_justice.jpg", image2:"desc_justice.jpg" },{ name:"XII · The Hanged Man", thumb:"thumb_hanged_man.jpg", image1:"thumb_hanged_man.jpg", image2:"desc_hanged_man.jpg" },{ name:"XIII · Death", thumb:"thumb_death.jpg", image1:"thumb_death.jpg", image2:"desc_death.jpg" },{ name:"XIV · Temperance", thumb:"thumb_temperance.jpg", image1:"thumb_temperance.jpg", image2:"desc_temperance.jpg" },{ name:"XV · The Devil", thumb:"thumb_devil.jpg", image1:"thumb_devil.jpg", image2:"desc_devil.jpg" },{ name:"XVI · The Tower", thumb:"thumb_tower.jpg", image1:"thumb_tower.jpg", image2:"desc_tower.jpg" },{ name:"XVII · The Star", thumb:"thumb_star.jpg", image1:"thumb_star.jpg", image2:"desc_star.jpg" },{ name:"XVIII · The Moon", thumb:"thumb_moon.jpg", image1:"thumb_moon.jpg", image2:"desc_moon.jpg" },{ name:"XIX · The Sun", thumb:"thumb_sun.jpg", image1:"thumb_sun.jpg", image2:"desc_sun.jpg" },{ name:"XX · Judgement", thumb:"thumb_judgement.jpg", image1:"thumb_judgement.jpg", image2:"desc_judgement.jpg" },{ name:"XXI · The World", thumb:"thumb_world.jpg", image1:"thumb_world.jpg", image2:"desc_world.jpg" }];
    function generateSuitCards(suit){ const ranks=["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]; return ranks.map(rank=>({ name:`${rank} of ${suit}`, descImg:`desc_${rank.toLowerCase()}_${suit.toLowerCase()}.jpg` })); }
    const minorSuitsData = [{ suit:"Wands", icon:"🔥", cards:generateSuitCards("Wands") },{ suit:"Cups", icon:"💧", cards:generateSuitCards("Cups") },{ suit:"Swords", icon:"⚔️", cards:generateSuitCards("Swords") },{ suit:"Pentacles", icon:"🪙", cards:generateSuitCards("Pentacles") }];
    function displayTwoImages(a,b,c,d){ document.getElementById("viewerContent").innerHTML=`<div class="dual-image-container"><div class="image-card"><img src="${IMG_BASE}${a}"><div class="image-caption">${c}</div></div><div class="image-card"><img src="${IMG_BASE}${b}"><div class="image-caption">${d}</div></div></div>`; }
    function displaySingle(a,b){ document.getElementById("viewerContent").innerHTML=`<div class="dual-image-container"><div class="image-card"><img src="${IMG_BASE}${a}"><div class="image-caption">${b}</div></div></div>`; }
    function clearAllActive(){ document.querySelectorAll('.text-guide-btn, .card-btn, .minor-card-btn').forEach(btn=>btn.classList.remove('active','active-card','active-minor')); }
    function buildTextButtons(){ const ic=document.getElementById("intro-buttons"), rc=document.getElementById("reading-buttons"); ic.innerHTML=""; rc.innerHTML=""; introItems.forEach(i=>{ const b=document.createElement("button"); b.className="text-guide-btn"; b.textContent=i.display; b.onclick=()=>{ clearAllActive(); b.classList.add("active"); if(i.dual&&i.secondImg) displayTwoImages(i.mainImg,i.secondImg,i.display+" p1",i.display+" p2"); else displaySingle(i.mainImg,i.display); }; ic.appendChild(b); }); readingItems.forEach(i=>{ const b=document.createElement("button"); b.className="text-guide-btn"; b.textContent=i.display; b.onclick=()=>{ clearAllActive(); b.classList.add("active"); if(i.dual&&i.secondImg) displayTwoImages(i.mainImg,i.secondImg,i.display+" p1",i.display+" p2"); else displaySingle(i.mainImg,i.display); }; rc.appendChild(b); }); }
    function buildMajorGrid(){ const g=document.getElementById("major-grid-container"); g.innerHTML=""; majorArcanaCards.forEach(c=>{ const d=document.createElement("div"); d.className="card-btn"; const i=document.createElement("img"); i.className="card-thumb"; i.src=IMG_BASE+c.thumb; i.onerror=()=>i.src="data:image/svg+xml,..."; const s=document.createElement("span"); s.className="card-label"; s.textContent=c.name.length>18?c.name.slice(0,16)+"..":c.name; d.append(i,s); d.onclick=()=>{ clearAllActive(); d.classList.add("active-card"); displayTwoImages(c.image1,c.image2,`${c.name} Thumb`,`${c.name} Desc`); }; g.appendChild(d); }); }
    function buildMinorArcanaAccordion(){ const a=document.getElementById("minor-arcana-accordion"); a.innerHTML=""; minorSuitsData.forEach(s=>{ const sd=document.createElement("div"); sd.className="minor-suit"; const h=document.createElement("div"); h.className="suit-header"; h.innerHTML=`<span>${s.icon} ${s.suit} (${s.cards.length})</span><span class="toggle-icon">▼</span>`; const cd=document.createElement("div"); cd.className="suit-cards"; s.cards.forEach(c=>{ const b=document.createElement("div"); b.className="minor-card-btn"; b.innerHTML=`<div class="minor-card-name">${c.name}</div>`; b.onclick=(e)=>{ e.stopPropagation(); clearAllActive(); b.classList.add("active-minor"); displaySingle(c.descImg,`${c.name} Guide`); }; cd.appendChild(b); }); h.onclick=()=>{ cd.classList.toggle("open"); h.querySelector(".toggle-icon").textContent=cd.classList.contains("open")?"▲":"▼"; }; sd.append(h,cd); a.appendChild(sd); }); }
    buildTextButtons(); buildMajorGrid(); buildMinorArcanaAccordion();
    document.getElementById("viewerContent").innerHTML = `<div class="fallback-message">🔮 Click any guide, Major card, or Minor card to reveal pages.</div>`;
  }
  
  // --- Tab Switching Logic ---
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tabId = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      if (tabId === 'reading') renderSpread();
    });
  });
  
  document.querySelectorAll('.template-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active-template'));
      btn.classList.add('active-template');
      currentTemplate = btn.getAttribute('data-template');
      currentSpread = [];
      cardImageModes = {};
      renderSpread();
    });
  });
  
  document.getElementById('drawReadingBtn').addEventListener('click', () => generateReading());
  
  rebuildOriginalUI();
  currentTemplate = "one";
  renderSpread();
    // ---------- EASTER EGG: LILIA'S SECRET COMBINATION ----------
  const SECRET_COMBINATION = [
    "Queen of Cups",
    "Three of Pentacles",
    "Knight of Wands",
    "II · The High Priestess",
    "Three of Swords",
    "XVI · The Tower",
    "XIII · Death"
  ];
  
  let easterEggActive = false;
  let secretModeEnabled = false;
  let safePassageClickCount = 0;
  let clickTimer = null;
  
  function showEasterEggToast(message, isSuccess = false) {
    const existingToast = document.querySelector('.easter-egg-toast');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'easter-egg-toast';
    toast.textContent = message;
    toast.style.cssText = `
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: ${isSuccess ? '#2c4522cc' : '#2c2220cc'};
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.85rem;
      color: ${isSuccess ? '#a8e6a0' : '#f5cb8b'};
      border: 1px solid ${isSuccess ? '#6aab5a' : '#e4b363'};
      z-index: 9999;
      font-family: monospace;
      pointer-events: none;
      white-space: nowrap;
      font-weight: bold;
    `;
    document.body.appendChild(toast);
    
    setTimeout(() => {
      if (toast.parentNode) toast.remove();
    }, 3000);
  }
  
  function resetSecretClickCount() {
    safePassageClickCount = 0;
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = null;
    
    if (!secretModeEnabled && !easterEggActive) {
      const safeBtn = document.querySelector('.template-btn[data-template="safe"]');
      if (safeBtn) {
        safeBtn.style.boxShadow = '';
        safeBtn.style.borderColor = '';
      }
    }
  }
  
  function onSafePassageButtonClick(btnElement) {
    if (secretModeEnabled || easterEggActive) return;
    
    safePassageClickCount++;
    
    btnElement.style.transform = 'scale(0.98)';
    setTimeout(() => {
      if (btnElement) btnElement.style.transform = '';
    }, 150);
    
    // Show progress toast on clicks 4, 5, and 6
    if (safePassageClickCount === 4 || safePassageClickCount === 5 || safePassageClickCount === 6) {
      showEasterEggToast(`🔮 ${7 - safePassageClickCount} more clicks to unlock the secret...`, false);
    }
    
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
      if (safePassageClickCount < 7) {
        if (safePassageClickCount > 0 && safePassageClickCount < 7) {
          showEasterEggToast("✨ The moment passes... The secret remains hidden.", false);
        }
        resetSecretClickCount();
      }
    }, 3000);
    
    if (safePassageClickCount >= 7) {
      easterEggActive = true;
      secretModeEnabled = true;
      
      showEasterEggToast("🐚✨ A hidden path reveals itself! The cards stir with ancient magic... ✨🐚", true);
      
      btnElement.style.transition = 'all 0.3s';
      btnElement.style.boxShadow = '0 0 20px #e4b363, inset 0 0 10px rgba(228, 179, 99, 0.3)';
      btnElement.style.borderColor = '#f5cb8b';
      btnElement.style.backgroundColor = '#6d4732';
      
      const drawBtn = document.getElementById('drawReadingBtn');
      if (drawBtn) {
        drawBtn.style.transition = 'all 0.3s';
        drawBtn.style.boxShadow = '0 0 20px #e4b363, inset 0 0 10px rgba(228, 179, 99, 0.3)';
        drawBtn.style.border = '1px solid #f5cb8b';
        drawBtn.style.animation = 'pulseGlow 1.5s infinite';
      }
      
      if (!document.querySelector('#pulseGlowStyle')) {
        const pulseStyle = document.createElement('style');
        pulseStyle.id = 'pulseGlowStyle';
        pulseStyle.textContent = `
          @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px #e4b363; border-color: #e4b363; }
            50% { box-shadow: 0 0 25px #f5cb8b; border-color: #f5cb8b; }
            100% { box-shadow: 0 0 5px #e4b363; border-color: #e4b363; }
          }
        `;
        document.head.appendChild(pulseStyle);
      }
      
      resetSecretClickCount();
    }
  }
  
  // Store the original generateReading function before overriding
  const originalGenerateReading = generateReading;
  
  // Override generateReading to check for easter egg
  generateReading = function() {
    let count = 1;
    if (currentTemplate === "three") count = 3;
    else if (currentTemplate === "whichwitch") count = 4;
    else if (currentTemplate === "safe") count = 7;
    
    if (currentTemplate === "safe" && secretModeEnabled) {
      // Use secret combination
      currentSpread = [...SECRET_COMBINATION];
      showEasterEggToast("🌙✨ The secret vision unfolds before you! ✨🌙", true);
      
      // Remove glows
      const safeBtn = document.querySelector('.template-btn[data-template="safe"]');
      if (safeBtn) {
        safeBtn.style.boxShadow = '';
        safeBtn.style.borderColor = '';
        safeBtn.style.backgroundColor = '';
      }
      const drawBtn = document.getElementById('drawReadingBtn');
      if (drawBtn) {
        drawBtn.style.boxShadow = '';
        drawBtn.style.border = '';
        drawBtn.style.animation = '';
      }
      
      secretModeEnabled = false;
      easterEggActive = false;
    } else {
      // Normal random draw
      currentSpread = originalGenerateReading();
    }
    
    cardImageModes = {};
    renderSpread();
    return currentSpread;
  };
  
  // Hook into the Safe Passage template button
  function setupEasterEggTrigger() {
    const safePassageBtn = document.querySelector('.template-btn[data-template="safe"]');
    if (safePassageBtn && !safePassageBtn._easterEggHooked) {
      safePassageBtn._easterEggHooked = true;
      
      safePassageBtn.addEventListener('click', (e) => {
        onSafePassageButtonClick(safePassageBtn);
      });
    }
  }
  
  // Set up observer for dynamically created buttons
  const easterEggObserver = new MutationObserver(() => {
    setupEasterEggTrigger();
  });
  easterEggObserver.observe(document.body, { childList: true, subtree: true });
  
  // Initial setup
  setTimeout(setupEasterEggTrigger, 500);
  
  // Reset easter egg when switching away from Safe Passage
  const allTemplateBtns = document.querySelectorAll('.template-btn');
  allTemplateBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.getAttribute('data-template') !== 'safe') {
        if (secretModeEnabled || easterEggActive) {
          secretModeEnabled = false;
          easterEggActive = false;
          
          const safeBtn = document.querySelector('.template-btn[data-template="safe"]');
          if (safeBtn) {
            safeBtn.style.boxShadow = '';
            safeBtn.style.borderColor = '';
            safeBtn.style.backgroundColor = '';
          }
          const drawBtn = document.getElementById('drawReadingBtn');
          if (drawBtn) {
            drawBtn.style.boxShadow = '';
            drawBtn.style.border = '';
            drawBtn.style.animation = '';
          }
        }
        resetSecretClickCount();
      }
    });
  });
  
  console.log("%c✨ A secret waits within Lilia's Safe Passage... Click it 7 times to awaken the magic. ✨", "color: #e4b363; font-size: 14px; font-style: italic;");

</script>
